<svg viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="480" fill="#f8fafc"/>
  <text x="450" y="40" font-size="26" font-weight="bold" text-anchor="middle" fill="#1e293b" font-family="Arial, sans-serif">
    PDF Security Layers
  </text>

  <!-- Layer 1: Access Control -->
  <rect x="40" y="70" width="250" height="160" rx="16" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <rect x="40" y="70" width="250" height="40" rx="16" fill="#3b82f6"/>
  <rect x="40" y="94" width="250" height="16" fill="#3b82f6"/>
  <text x="165" y="96" font-size="16" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial, sans-serif">🔐 Access Control</text>
  <text x="60" y="135" font-size="13" fill="#334155" font-family="Arial, sans-serif">• View count limits</text>
  <text x="60" y="155" font-size="13" fill="#334155" font-family="Arial, sans-serif">• Expiration dates</text>
  <text x="60" y="175" font-size="13" fill="#334155" font-family="Arial, sans-serif">• Email verification</text>
  <text x="60" y="195" font-size="13" fill="#334155" font-family="Arial, sans-serif">• Password protection</text>
  <text x="60" y="215" font-size="13" fill="#334155" font-family="Arial, sans-serif">• Session time limits</text>

  <!-- Layer 2: Content Protection -->
  <rect x="325" y="70" width="250" height="160" rx="16" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2"/>
  <rect x="325" y="70" width="250" height="40" rx="16" fill="#8b5cf6"/>
  <rect x="325" y="94" width="250" height="16" fill="#8b5cf6"/>
  <text x="450" y="96" font-size="16" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial, sans-serif">🛡️ Content Protection</text>
  <text x="345" y="135" font-size="13" fill="#334155" font-family="Arial, sans-serif">• Disable downloads</text>
  <text x="345" y="155" font-size="13" fill="#334155" font-family="Arial, sans-serif">• Disable printing</text>
  <text x="345" y="175" font-size="13" fill="#334155" font-family="Arial, sans-serif">• Dynamic watermarks</text>
  <text x="345" y="195" font-size="13" fill="#334155" font-family="Arial, sans-serif">• Viewer-only mode</text>
  <text x="345" y="215" font-size="13" fill="#334155" font-family="Arial, sans-serif">• PDF encryption (qpdf)</text>

  <!-- Layer 3: Monitoring -->
  <rect x="610" y="70" width="250" height="160" rx="16" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <rect x="610" y="70" width="250" height="40" rx="16" fill="#10b981"/>
  <rect x="610" y="94" width="250" height="16" fill="#10b981"/>
  <text x="735" y="96" font-size="16" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial, sans-serif">📊 Monitoring</text>
  <text x="630" y="135" font-size="13" fill="#334155" font-family="Arial, sans-serif">• Access records</text>
  <text x="630" y="155" font-size="13" fill="#334155" font-family="Arial, sans-serif">• Viewer IP + location</text>
  <text x="630" y="175" font-size="13" fill="#334155" font-family="Arial, sans-serif">• Email notifications</text>
  <text x="630" y="195" font-size="13" fill="#334155" font-family="Arial, sans-serif">• Open time tracking</text>
  <text x="630" y="215" font-size="13" fill="#334155" font-family="Arial, sans-serif">• Reading duration</text>

  <!-- Bottom: How layers connect -->
  <text x="450" y="275" font-size="18" font-weight="bold" text-anchor="middle" fill="#475569" font-family="Arial, sans-serif">
    How It Works Together
  </text>

  <rect x="60" y="300" width="780" height="130" rx="16" fill="#fff" stroke="#e2e8f0" stroke-width="2"/>

  <!-- Flow inside -->
  <circle cx="140" cy="365" r="35" fill="#3b82f6"/>
  <text x="140" y="360" font-size="24" text-anchor="middle" fill="white" font-family="Arial, sans-serif">📄</text>
  <text x="140" y="385" font-size="10" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial, sans-serif">Upload</text>

  <path d="M 175 365 L 230 365" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arr2)"/>

  <circle cx="275" cy="365" r="35" fill="#8b5cf6"/>
  <text x="275" y="360" font-size="24" text-anchor="middle" fill="white" font-family="Arial, sans-serif">⚙️</text>
  <text x="275" y="385" font-size="10" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial, sans-serif">Configure</text>

  <path d="M 310 365 L 365 365" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arr2)"/>

  <circle cx="410" cy="365" r="35" fill="#10b981"/>
  <text x="410" y="360" font-size="24" text-anchor="middle" fill="white" font-family="Arial, sans-serif">🔗</text>
  <text x="410" y="385" font-size="10" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial, sans-serif">Share</text>

  <path d="M 445 365 L 500 365" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arr2)"/>

  <rect x="510" y="340" width="110" height="50" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="565" y="360" font-size="11" font-weight="bold" text-anchor="middle" fill="#92400e" font-family="Arial, sans-serif">Viewer opens</text>
  <text x="565" y="378" font-size="11" text-anchor="middle" fill="#92400e" font-family="Arial, sans-serif">→ Checks limits</text>

  <path d="M 620 365 L 660 365" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arr2)"/>

  <rect x="670" y="330" width="140" height="70" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="740" y="355" font-size="11" font-weight="bold" text-anchor="middle" fill="#991b1b" font-family="Arial, sans-serif">✓ Allow → View PDF</text>
  <text x="740" y="375" font-size="11" font-weight="bold" text-anchor="middle" fill="#991b1b" font-family="Arial, sans-serif">✗ Deny → Blocked</text>
  <text x="740" y="393" font-size="10" text-anchor="middle" fill="#991b1b" font-family="Arial, sans-serif">Log access record</text>

  <defs>
    <marker id="arr2" markerWidth="10" markerHeight="10" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#94a3b8"/>
    </marker>
  </defs>

  <g>
    <rect x="60%" y="93%" width="38%" height="5%" rx="6" fill="#ffffff" opacity="0.75"/>
    <text x="97%" y="96.5%" text-anchor="end" dominant-baseline="middle"
          font-size="11" font-family="Arial, sans-serif" fill="#0f172a" opacity="0.55">MaiPDF · Security Layers</text>
  </g>
</svg>