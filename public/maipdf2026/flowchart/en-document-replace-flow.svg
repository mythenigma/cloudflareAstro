<svg viewBox="0 0 900 460" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="460" fill="#f8fafc"/>
  <text x="450" y="40" font-size="26" font-weight="bold" text-anchor="middle" fill="#1e293b" font-family="Arial, sans-serif">
    Document Replace Flow — Same Link, New File
  </text>

  <!-- Timeline -->
  <line x1="100" y1="140" x2="800" y2="140" stroke="#cbd5e1" stroke-width="3"/>

  <!-- Point 1: Original share -->
  <circle cx="180" cy="140" r="24" fill="#3b82f6"/>
  <text x="180" y="147" font-size="18" text-anchor="middle" fill="white" font-family="Arial, sans-serif">1</text>
  <text x="180" y="100" font-size="14" font-weight="bold" text-anchor="middle" fill="#1e293b" font-family="Arial, sans-serif">Share PDF v1</text>
  <text x="180" y="180" font-size="12" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif">Upload &amp; share</text>
  <text x="180" y="197" font-size="12" text-anchor="middle" fill="#3b82f6" font-family="Arial, sans-serif">maipdf.com/file/abc</text>

  <!-- Point 2: Need to update -->
  <circle cx="380" cy="140" r="24" fill="#f59e0b"/>
  <text x="380" y="147" font-size="18" text-anchor="middle" fill="white" font-family="Arial, sans-serif">2</text>
  <text x="380" y="100" font-size="14" font-weight="bold" text-anchor="middle" fill="#1e293b" font-family="Arial, sans-serif">Need Update</text>
  <text x="380" y="180" font-size="12" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif">Found error or</text>
  <text x="380" y="197" font-size="12" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif">new version ready</text>

  <!-- Point 3: Replace -->
  <circle cx="580" cy="140" r="24" fill="#8b5cf6"/>
  <text x="580" y="147" font-size="18" text-anchor="middle" fill="white" font-family="Arial, sans-serif">3</text>
  <text x="580" y="100" font-size="14" font-weight="bold" text-anchor="middle" fill="#1e293b" font-family="Arial, sans-serif">Replace File</text>
  <text x="580" y="180" font-size="12" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif">Upload new PDF via</text>
  <text x="580" y="197" font-size="12" text-anchor="middle" fill="#8b5cf6" font-family="Arial, sans-serif">replace portal</text>

  <!-- Point 4: Done -->
  <circle cx="760" cy="140" r="24" fill="#10b981"/>
  <text x="760" y="147" font-size="18" text-anchor="middle" fill="white" font-family="Arial, sans-serif">4</text>
  <text x="760" y="100" font-size="14" font-weight="bold" text-anchor="middle" fill="#1e293b" font-family="Arial, sans-serif">Same Link</text>
  <text x="760" y="180" font-size="12" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif">Recipients see v2</text>
  <text x="760" y="197" font-size="12" text-anchor="middle" fill="#10b981" font-family="Arial, sans-serif">maipdf.com/file/abc</text>

  <!-- Comparison box -->
  <text x="450" y="260" font-size="18" font-weight="bold" text-anchor="middle" fill="#475569" font-family="Arial, sans-serif">
    What Changes vs What Stays
  </text>

  <!-- Changes column -->
  <rect x="100" y="285" width="320" height="140" rx="14" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="260" y="312" font-size="15" font-weight="bold" text-anchor="middle" fill="#991b1b" font-family="Arial, sans-serif">🔄 What Changes</text>
  <text x="120" y="340" font-size="13" fill="#334155" font-family="Arial, sans-serif">• PDF file content → new version</text>
  <text x="120" y="362" font-size="13" fill="#334155" font-family="Arial, sans-serif">• View count → resets (optional)</text>
  <text x="120" y="384" font-size="13" fill="#334155" font-family="Arial, sans-serif">• Security settings → update if needed</text>
  <text x="120" y="406" font-size="13" fill="#334155" font-family="Arial, sans-serif">• Expiration → can be extended</text>

  <!-- Stays column -->
  <rect x="480" y="285" width="320" height="140" rx="14" fill="#ecfdf5" stroke="#86efac" stroke-width="1.5"/>
  <text x="640" y="312" font-size="15" font-weight="bold" text-anchor="middle" fill="#065f46" font-family="Arial, sans-serif">✅ What Stays</text>
  <text x="500" y="340" font-size="13" fill="#334155" font-family="Arial, sans-serif">• Share link → same URL</text>
  <text x="500" y="362" font-size="13" fill="#334155" font-family="Arial, sans-serif">• QR code → still works</text>
  <text x="500" y="384" font-size="13" fill="#334155" font-family="Arial, sans-serif">• Recipients → no re-sharing needed</text>
  <text x="500" y="406" font-size="13" fill="#334155" font-family="Arial, sans-serif">• Access records → preserved</text>

  <defs>
    <marker id="arr4" markerWidth="10" markerHeight="10" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#94a3b8"/>
    </marker>
  </defs>

  <g>
    <rect x="60%" y="93%" width="38%" height="5%" rx="6" fill="#ffffff" opacity="0.75"/>
    <text x="97%" y="96.5%" text-anchor="end" dominant-baseline="middle"
          font-size="11" font-family="Arial, sans-serif" fill="#0f172a" opacity="0.55">MaiPDF · File Replace</text>
  </g>
</svg>