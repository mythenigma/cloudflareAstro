<svg viewBox="0 0 900 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="400" fill="#f8fafc"/>
  <text x="450" y="38" font-size="26" font-weight="bold" text-anchor="middle" fill="#1e293b" font-family="Arial, sans-serif">
    Dynamic Watermark Protection
  </text>

  <!-- Before sharing -->
  <rect x="40" y="65" width="260" height="140" rx="16" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="170" y="92" font-size="15" font-weight="bold" text-anchor="middle" fill="#1e40af" font-family="Arial, sans-serif">📄 Original PDF</text>
  <rect x="60" y="108" width="220" height="80" rx="8" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="170" y="135" font-size="13" text-anchor="middle" fill="#334155" font-family="Arial, sans-serif">Clean document content</text>
  <text x="170" y="155" font-size="13" text-anchor="middle" fill="#334155" font-family="Arial, sans-serif">No watermarks visible</text>
  <text x="170" y="175" font-size="13" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif">Uploaded by owner</text>

  <!-- Arrow -->
  <path d="M 300 135 L 340 135" stroke="#94a3b8" stroke-width="3" fill="none" marker-end="url(#arr6)"/>
  <text x="320" y="125" font-size="11" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif">share</text>

  <!-- When viewed -->
  <rect x="340" y="65" width="280" height="140" rx="16" fill="#faf5ff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="480" y="92" font-size="15" font-weight="bold" text-anchor="middle" fill="#6d28d9" font-family="Arial, sans-serif">👀 When Viewer Opens</text>
  <rect x="360" y="108" width="240" height="80" rx="8" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="480" y="128" font-size="12" text-anchor="middle" fill="#334155" font-family="Arial, sans-serif">Document content with overlay:</text>
  <text x="480" y="150" font-size="12" font-weight="bold" text-anchor="middle" fill="#8b5cf6" font-family="Arial, sans-serif">viewer@email.com</text>
  <text x="480" y="168" font-size="12" font-weight="bold" text-anchor="middle" fill="#8b5cf6" font-family="Arial, sans-serif">2026-04-03 · IP 203.0.x.x</text>
  <text x="400" y="118" font-size="26" fill="#8b5cf6" opacity="0.3" font-family="Arial, sans-serif" transform="rotate(-15, 480, 140)">WATERMARK</text>

  <!-- Arrow -->
  <path d="M 620 135 L 660 135" stroke="#94a3b8" stroke-width="3" fill="none" marker-end="url(#arr6)"/>

  <!-- Tracked info -->
  <rect x="660" y="65" width="200" height="140" rx="16" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="760" y="92" font-size="15" font-weight="bold" text-anchor="middle" fill="#047857" font-family="Arial, sans-serif">📊 Tracked Info</text>
  <text x="680" y="120" font-size="12" fill="#334155" font-family="Arial, sans-serif">• Viewer email</text>
  <text x="680" y="140" font-size="12" fill="#334155" font-family="Arial, sans-serif">• IP address</text>
  <text x="680" y="160" font-size="12" fill="#334155" font-family="Arial, sans-serif">• Access time</text>
  <text x="680" y="180" font-size="12" fill="#334155" font-family="Arial, sans-serif">• Device info</text>

  <!-- Bottom section: What watermark contains -->
  <text x="450" y="245" font-size="18" font-weight="bold" text-anchor="middle" fill="#475569" font-family="Arial, sans-serif">
    Watermark Can Include
  </text>

  <rect x="50" y="270" width="150" height="70" rx="12" fill="#fff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="125" y="297" font-size="22" text-anchor="middle" font-family="Arial, sans-serif">📧</text>
  <text x="125" y="320" font-size="13" font-weight="bold" text-anchor="middle" fill="#1e40af" font-family="Arial, sans-serif">Viewer Email</text>

  <rect x="220" y="270" width="150" height="70" rx="12" fill="#fff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="295" y="297" font-size="22" text-anchor="middle" font-family="Arial, sans-serif">🌐</text>
  <text x="295" y="320" font-size="13" font-weight="bold" text-anchor="middle" fill="#6d28d9" font-family="Arial, sans-serif">IP Address</text>

  <rect x="390" y="270" width="150" height="70" rx="12" fill="#fff" stroke="#10b981" stroke-width="1.5"/>
  <text x="465" y="297" font-size="22" text-anchor="middle" font-family="Arial, sans-serif">📅</text>
  <text x="465" y="320" font-size="13" font-weight="bold" text-anchor="middle" fill="#047857" font-family="Arial, sans-serif">Date &amp; Time</text>

  <rect x="560" y="270" width="150" height="70" rx="12" fill="#fff" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="635" y="297" font-size="22" text-anchor="middle" font-family="Arial, sans-serif">✏️</text>
  <text x="635" y="320" font-size="13" font-weight="bold" text-anchor="middle" fill="#b45309" font-family="Arial, sans-serif">Custom Text</text>

  <rect x="730" y="270" width="130" height="70" rx="12" fill="#fff" stroke="#ef4444" stroke-width="1.5"/>
  <text x="795" y="297" font-size="22" text-anchor="middle" font-family="Arial, sans-serif">🔢</text>
  <text x="795" y="320" font-size="13" font-weight="bold" text-anchor="middle" fill="#b91c1c" font-family="Arial, sans-serif">View Count</text>

  <!-- Deterrence note -->
  <rect x="150" y="360" width="600" height="30" rx="8" fill="#fef3c7"/>
  <text x="450" y="381" font-size="13" text-anchor="middle" fill="#92400e" font-family="Arial, sans-serif">
    💡 Each viewer sees unique watermark — deters screenshots &amp; unauthorized sharing
  </text>

  <defs>
    <marker id="arr6" markerWidth="10" markerHeight="10" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>