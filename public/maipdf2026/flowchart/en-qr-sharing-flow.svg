<svg viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="420" fill="#f8fafc"/>
  <text x="450" y="40" font-size="26" font-weight="bold" text-anchor="middle" fill="#1e293b" font-family="Arial, sans-serif">
    QR Code PDF Sharing Flow
  </text>

  <!-- Step 1 -->
  <rect x="50" y="80" width="180" height="120" rx="20" fill="#3b82f6"/>
  <text x="140" y="125" font-size="36" text-anchor="middle" fill="white" font-family="Arial, sans-serif">📄</text>
  <text x="140" y="160" font-size="15" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial, sans-serif">1. Upload PDF</text>
  <text x="140" y="180" font-size="11" text-anchor="middle" fill="#dbeafe" font-family="Arial, sans-serif">Any size, any format</text>

  <path d="M 230 140 L 280 140" stroke="#94a3b8" stroke-width="3" fill="none" marker-end="url(#arr3)"/>

  <!-- Step 2 -->
  <rect x="280" y="80" width="180" height="120" rx="20" fill="#8b5cf6"/>
  <text x="370" y="125" font-size="36" text-anchor="middle" fill="white" font-family="Arial, sans-serif">⚙️</text>
  <text x="370" y="160" font-size="15" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial, sans-serif">2. Set Permissions</text>
  <text x="370" y="180" font-size="11" text-anchor="middle" fill="#ede9fe" font-family="Arial, sans-serif">Views, expiry, security</text>

  <path d="M 460 140 L 510 140" stroke="#94a3b8" stroke-width="3" fill="none" marker-end="url(#arr3)"/>

  <!-- Step 3 -->
  <rect x="510" y="80" width="180" height="120" rx="20" fill="#10b981"/>
  <text x="600" y="125" font-size="36" text-anchor="middle" fill="white" font-family="Arial, sans-serif">🔗</text>
  <text x="600" y="160" font-size="15" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial, sans-serif">3. Get Link + QR</text>
  <text x="600" y="180" font-size="11" text-anchor="middle" fill="#d1fae5" font-family="Arial, sans-serif">Auto-generated pair</text>

  <path d="M 690 140 L 720 140" stroke="#94a3b8" stroke-width="3" fill="none" marker-end="url(#arr3)"/>

  <!-- Step 4 -->
  <rect x="720" y="80" width="140" height="120" rx="20" fill="#f59e0b"/>
  <text x="790" y="125" font-size="36" text-anchor="middle" fill="white" font-family="Arial, sans-serif">📱</text>
  <text x="790" y="160" font-size="15" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial, sans-serif">4. Scan</text>
  <text x="790" y="180" font-size="11" text-anchor="middle" fill="#fef3c7" font-family="Arial, sans-serif">Phone camera</text>

  <!-- Use case boxes below -->
  <text x="450" y="250" font-size="18" font-weight="bold" text-anchor="middle" fill="#475569" font-family="Arial, sans-serif">
    Where to Use QR Codes
  </text>

  <rect x="50" y="275" width="155" height="80" rx="12" fill="#fff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="128" y="305" font-size="24" text-anchor="middle" font-family="Arial, sans-serif">📋</text>
  <text x="128" y="328" font-size="12" font-weight="bold" text-anchor="middle" fill="#1e40af" font-family="Arial, sans-serif">Business Cards</text>
  <text x="128" y="345" font-size="10" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif">Portfolio / Resume</text>

  <rect x="220" y="275" width="155" height="80" rx="12" fill="#fff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="298" y="305" font-size="24" text-anchor="middle" font-family="Arial, sans-serif">📦</text>
  <text x="298" y="328" font-size="12" font-weight="bold" text-anchor="middle" fill="#6d28d9" font-family="Arial, sans-serif">Product Packaging</text>
  <text x="298" y="345" font-size="10" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif">Manual / Specs</text>

  <rect x="390" y="275" width="155" height="80" rx="12" fill="#fff" stroke="#10b981" stroke-width="1.5"/>
  <text x="468" y="305" font-size="24" text-anchor="middle" font-family="Arial, sans-serif">🎓</text>
  <text x="468" y="328" font-size="12" font-weight="bold" text-anchor="middle" fill="#047857" font-family="Arial, sans-serif">Classrooms</text>
  <text x="468" y="345" font-size="10" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif">Handouts / Homework</text>

  <rect x="560" y="275" width="155" height="80" rx="12" fill="#fff" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="638" y="305" font-size="24" text-anchor="middle" font-family="Arial, sans-serif">🏢</text>
  <text x="638" y="328" font-size="12" font-weight="bold" text-anchor="middle" fill="#b45309" font-family="Arial, sans-serif">Events / Meetings</text>
  <text x="638" y="345" font-size="10" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif">Agenda / Slides</text>

  <rect x="730" y="275" width="130" height="80" rx="12" fill="#fff" stroke="#ef4444" stroke-width="1.5"/>
  <text x="795" y="305" font-size="24" text-anchor="middle" font-family="Arial, sans-serif">🏗️</text>
  <text x="795" y="328" font-size="12" font-weight="bold" text-anchor="middle" fill="#b91c1c" font-family="Arial, sans-serif">Job Sites</text>
  <text x="795" y="345" font-size="10" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif">Plans / Safety docs</text>

  <defs>
    <marker id="arr3" markerWidth="10" markerHeight="10" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#94a3b8"/>
    </marker>
  </defs>

  <g>
    <rect x="60%" y="93%" width="38%" height="5%" rx="6" fill="#ffffff" opacity="0.75"/>
    <text x="97%" y="96.5%" text-anchor="end" dominant-baseline="middle"
          font-size="11" font-family="Arial, sans-serif" fill="#0f172a" opacity="0.55">MaiPDF · QR Sharing</text>
  </g>
</svg>