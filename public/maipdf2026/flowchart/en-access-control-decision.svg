<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="500" fill="#f8fafc"/>
  <text x="450" y="40" font-size="26" font-weight="bold" text-anchor="middle" fill="#1e293b" font-family="Arial, sans-serif">
    View Limit &amp; Access Control Decision Flow
  </text>

  <!-- Start node -->
  <rect x="350" y="65" width="200" height="45" rx="22" fill="#3b82f6"/>
  <text x="450" y="93" font-size="15" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial, sans-serif">Viewer Opens Link</text>

  <line x1="450" y1="110" x2="450" y2="140" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr5)"/>

  <!-- Decision: Email required? -->
  <polygon points="450,140 560,185 450,230 340,185" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="450" y="185" font-size="13" font-weight="bold" text-anchor="middle" fill="#92400e" font-family="Arial, sans-serif">Email Verify?</text>

  <!-- Yes path -->
  <line x1="560" y1="185" x2="660" y2="185" stroke="#10b981" stroke-width="2" marker-end="url(#arr5)"/>
  <text x="610" y="178" font-size="11" fill="#10b981" font-family="Arial, sans-serif">Yes</text>
  <rect x="660" y="162" width="180" height="46" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="750" y="182" font-size="12" text-anchor="middle" fill="#065f46" font-family="Arial, sans-serif">Enter email → verify</text>
  <text x="750" y="198" font-size="12" text-anchor="middle" fill="#065f46" font-family="Arial, sans-serif">Only allowed emails pass</text>

  <!-- No path -->
  <line x1="450" y1="230" x2="450" y2="265" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr5)"/>
  <text x="462" y="250" font-size="11" fill="#94a3b8" font-family="Arial, sans-serif">No</text>

  <!-- Merge -->
  <line x1="750" y1="208" x2="750" y2="280" stroke="#94a3b8" stroke-width="2"/>
  <line x1="750" y1="280" x2="450" y2="280" stroke="#94a3b8" stroke-width="2"/>

  <!-- Decision: Views remaining? -->
  <polygon points="450,265 560,310 450,355 340,310" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="450" y="307" font-size="12" font-weight="bold" text-anchor="middle" fill="#92400e" font-family="Arial, sans-serif">Views Left?</text>

  <!-- No views left -->
  <line x1="340" y1="310" x2="180" y2="310" stroke="#ef4444" stroke-width="2" marker-end="url(#arr5)"/>
  <text x="260" y="303" font-size="11" fill="#ef4444" font-family="Arial, sans-serif">No</text>
  <rect x="50" y="287" width="130" height="46" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="115" y="307" font-size="12" font-weight="bold" text-anchor="middle" fill="#991b1b" font-family="Arial, sans-serif">🚫 Access</text>
  <text x="115" y="323" font-size="12" font-weight="bold" text-anchor="middle" fill="#991b1b" font-family="Arial, sans-serif">Denied</text>

  <!-- Yes path -->
  <line x1="450" y1="355" x2="450" y2="385" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr5)"/>
  <text x="462" y="372" font-size="11" fill="#10b981" font-family="Arial, sans-serif">Yes</text>

  <!-- Decision: Expired? -->
  <polygon points="450,385 540,420 450,455 360,420" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="450" y="423" font-size="12" font-weight="bold" text-anchor="middle" fill="#92400e" font-family="Arial, sans-serif">Expired?</text>

  <!-- Yes expired -->
  <line x1="360" y1="420" x2="180" y2="420" stroke="#ef4444" stroke-width="2" marker-end="url(#arr5)"/>
  <text x="270" y="413" font-size="11" fill="#ef4444" font-family="Arial, sans-serif">Yes</text>
  <rect x="50" y="397" width="130" height="46" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="115" y="417" font-size="12" font-weight="bold" text-anchor="middle" fill="#991b1b" font-family="Arial, sans-serif">⏰ Link</text>
  <text x="115" y="433" font-size="12" font-weight="bold" text-anchor="middle" fill="#991b1b" font-family="Arial, sans-serif">Expired</text>

  <!-- No, not expired → Allow -->
  <line x1="540" y1="420" x2="660" y2="420" stroke="#10b981" stroke-width="2" marker-end="url(#arr5)"/>
  <text x="600" y="413" font-size="11" fill="#10b981" font-family="Arial, sans-serif">No</text>
  <rect x="660" y="390" width="200" height="60" rx="14" fill="#10b981"/>
  <text x="760" y="415" font-size="15" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial, sans-serif">✅ View PDF</text>
  <text x="760" y="436" font-size="12" text-anchor="middle" fill="#d1fae5" font-family="Arial, sans-serif">Watermark + log access</text>

  <defs>
    <marker id="arr5" markerWidth="10" markerHeight="10" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#94a3b8"/>
    </marker>
  </defs>

  <g>
    <rect x="60%" y="93%" width="38%" height="5%" rx="6" fill="#ffffff" opacity="0.75"/>
    <text x="97%" y="96.5%" text-anchor="end" dominant-baseline="middle"
          font-size="11" font-family="Arial, sans-serif" fill="#0f172a" opacity="0.55">MaiPDF · Access Control</text>
  </g>
</svg>