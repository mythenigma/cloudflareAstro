<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="500" fill="#f8fafc"/>
  <text x="450" y="45" font-size="28" font-weight="bold" text-anchor="middle" fill="#1e293b" font-family="Arial, sans-serif">
    Upload → Share → Track Workflow
  </text>

  <!-- Step 1: Upload -->
  <rect x="40" y="90" width="160" height="130" rx="16" fill="#3b82f6"/>
  <text x="120" y="140" font-size="40" text-anchor="middle" fill="white" font-family="Arial, sans-serif">📄</text>
  <text x="120" y="175" font-size="16" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial, sans-serif">Upload PDF</text>
  <text x="120" y="200" font-size="12" text-anchor="middle" fill="#dbeafe" font-family="Arial, sans-serif">Drag &amp; drop or browse</text>

  <!-- Arrow 1 -->
  <path d="M 200 155 L 250 155" stroke="#94a3b8" stroke-width="3" fill="none" marker-end="url(#arr1)"/>

  <!-- Step 2: Configure -->
  <rect x="250" y="90" width="160" height="130" rx="16" fill="#8b5cf6"/>
  <text x="330" y="140" font-size="40" text-anchor="middle" fill="white" font-family="Arial, sans-serif">⚙️</text>
  <text x="330" y="175" font-size="16" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial, sans-serif">Set Controls</text>
  <text x="330" y="200" font-size="12" text-anchor="middle" fill="#ede9fe" font-family="Arial, sans-serif">Views · Expiry · DRM</text>

  <!-- Arrow 2 -->
  <path d="M 410 155 L 460 155" stroke="#94a3b8" stroke-width="3" fill="none" marker-end="url(#arr1)"/>

  <!-- Step 3: Generate -->
  <rect x="460" y="90" width="160" height="130" rx="16" fill="#10b981"/>
  <text x="540" y="140" font-size="40" text-anchor="middle" fill="white" font-family="Arial, sans-serif">🔗</text>
  <text x="540" y="175" font-size="16" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial, sans-serif">Get Link + QR</text>
  <text x="540" y="200" font-size="12" text-anchor="middle" fill="#d1fae5" font-family="Arial, sans-serif">Instant shareable URL</text>

  <!-- Arrow 3 -->
  <path d="M 620 155 L 670 155" stroke="#94a3b8" stroke-width="3" fill="none" marker-end="url(#arr1)"/>

  <!-- Step 4: Share -->
  <rect x="670" y="90" width="180" height="130" rx="16" fill="#f59e0b"/>
  <text x="760" y="140" font-size="40" text-anchor="middle" fill="white" font-family="Arial, sans-serif">📤</text>
  <text x="760" y="175" font-size="16" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial, sans-serif">Share Anywhere</text>
  <text x="760" y="200" font-size="12" text-anchor="middle" fill="#fef3c7" font-family="Arial, sans-serif">Email · Chat · Social</text>

  <!-- Bottom row: Post-share actions -->
  <text x="450" y="280" font-size="20" font-weight="bold" text-anchor="middle" fill="#475569" font-family="Arial, sans-serif">
    After Sharing
  </text>

  <rect x="60" y="310" width="170" height="100" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="2"/>
  <text x="145" y="348" font-size="28" text-anchor="middle" font-family="Arial, sans-serif">📊</text>
  <text x="145" y="375" font-size="14" font-weight="bold" text-anchor="middle" fill="#334155" font-family="Arial, sans-serif">Track Views</text>
  <text x="145" y="395" font-size="11" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif">Who opened, when</text>

  <rect x="260" y="310" width="170" height="100" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="2"/>
  <text x="345" y="348" font-size="28" text-anchor="middle" font-family="Arial, sans-serif">🔄</text>
  <text x="345" y="375" font-size="14" font-weight="bold" text-anchor="middle" fill="#334155" font-family="Arial, sans-serif">Replace File</text>
  <text x="345" y="395" font-size="11" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif">Same link, new PDF</text>

  <rect x="460" y="310" width="170" height="100" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="2"/>
  <text x="545" y="348" font-size="28" text-anchor="middle" font-family="Arial, sans-serif">🛡️</text>
  <text x="545" y="375" font-size="14" font-weight="bold" text-anchor="middle" fill="#334155" font-family="Arial, sans-serif">Watermark</text>
  <text x="545" y="395" font-size="11" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif">Dynamic viewer info</text>

  <rect x="660" y="310" width="170" height="100" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="2"/>
  <text x="745" y="348" font-size="28" text-anchor="middle" font-family="Arial, sans-serif">⏰</text>
  <text x="745" y="375" font-size="14" font-weight="bold" text-anchor="middle" fill="#334155" font-family="Arial, sans-serif">Auto-Expire</text>
  <text x="745" y="395" font-size="11" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif">Time or view limit</text>

  <!-- Connecting lines from Share to bottom -->
  <path d="M 540 220 L 540 260 L 145 260 L 145 310" stroke="#cbd5e1" stroke-width="1.5" fill="none" stroke-dasharray="6,4"/>
  <path d="M 540 260 L 345 260 L 345 310" stroke="#cbd5e1" stroke-width="1.5" fill="none" stroke-dasharray="6,4"/>
  <path d="M 540 260 L 545 260 L 545 310" stroke="#cbd5e1" stroke-width="1.5" fill="none" stroke-dasharray="6,4"/>
  <path d="M 540 260 L 745 260 L 745 310" stroke="#cbd5e1" stroke-width="1.5" fill="none" stroke-dasharray="6,4"/>

  <defs>
    <marker id="arr1" markerWidth="10" markerHeight="10" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#94a3b8"/>
    </marker>
  </defs>

  <g>
    <rect x="60%" y="93%" width="38%" height="5%" rx="6" fill="#ffffff" opacity="0.75"/>
    <text x="97%" y="96.5%" text-anchor="end" dominant-baseline="middle"
          font-size="11" font-family="Arial, sans-serif" fill="#0f172a" opacity="0.55">MaiPDF · Upload Share Track</text>
  </g>
</svg>