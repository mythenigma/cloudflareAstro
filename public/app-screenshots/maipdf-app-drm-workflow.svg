<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">MaiPDF App DRM workflow for protected .maipdf files</title>
  <desc id="desc">Five-step workflow: choose PDF, create .maipdf, set license rules, reader opens in app, owner manages access.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0F172A"/><stop offset="1" stop-color="#312E81"/></linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#A78BFA"/><stop offset="1" stop-color="#38BDF8"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000" flood-opacity="0.28"/></filter>
    <style>.font{font-family:Inter,Segoe UI,Arial,sans-serif}.title{font-size:44px;font-weight:850;fill:#fff}.sub{font-size:21px;fill:#CBD5E1}.step{font-size:19px;font-weight:800;fill:#0F172A}.body{font-size:17px;fill:#475569}.num{font-size:28px;font-weight:900;fill:#fff}.cap{font-size:18px;fill:#E0E7FF}.foot{font-size:18px;fill:#CBD5E1}</style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1100" cy="95" r="180" fill="#7C3AED" opacity="0.22"/>
  <circle cx="140" cy="650" r="240" fill="#0EA5E9" opacity="0.18"/>
  <text x="640" y="72" text-anchor="middle" class="font title">How App DRM protects a PDF after sending</text>
  <text x="640" y="112" text-anchor="middle" class="font sub">The PDF becomes a protected .maipdf file opened by the MaiPDF App, with license checks and reader controls.</text>

  <g transform="translate(70 205)" filter="url(#shadow)">
    <rect width="210" height="270" rx="28" fill="#fff"/>
    <circle cx="105" cy="58" r="30" fill="url(#accent)"/><text x="105" y="68" text-anchor="middle" class="font num">1</text>
    <text x="105" y="120" text-anchor="middle" class="font step">Choose PDF</text>
    <text x="105" y="154" text-anchor="middle" class="font body">Select the file</text>
    <text x="105" y="180" text-anchor="middle" class="font body">that needs stronger</text>
    <text x="105" y="206" text-anchor="middle" class="font body">control.</text>
  </g>
  <path d="M292 340 H374" stroke="#A5B4FC" stroke-width="6" stroke-linecap="round"/>

  <g transform="translate(390 205)" filter="url(#shadow)">
    <rect width="210" height="270" rx="28" fill="#fff"/>
    <circle cx="105" cy="58" r="30" fill="url(#accent)"/><text x="105" y="68" text-anchor="middle" class="font num">2</text>
    <text x="105" y="120" text-anchor="middle" class="font step">Create .maipdf</text>
    <text x="105" y="154" text-anchor="middle" class="font body">Package the PDF</text>
    <text x="105" y="180" text-anchor="middle" class="font body">so it no longer</text>
    <text x="105" y="206" text-anchor="middle" class="font body">opens like a normal PDF.</text>
  </g>
  <path d="M612 340 H694" stroke="#A5B4FC" stroke-width="6" stroke-linecap="round"/>

  <g transform="translate(710 205)" filter="url(#shadow)">
    <rect width="210" height="270" rx="28" fill="#fff"/>
    <circle cx="105" cy="58" r="30" fill="url(#accent)"/><text x="105" y="68" text-anchor="middle" class="font num">3</text>
    <text x="105" y="120" text-anchor="middle" class="font step">Set license rules</text>
    <text x="105" y="154" text-anchor="middle" class="font body">Expiry, open limits,</text>
    <text x="105" y="180" text-anchor="middle" class="font body">allowed emails and</text>
    <text x="105" y="206" text-anchor="middle" class="font body">device limits.</text>
  </g>
  <path d="M932 340 H1014" stroke="#A5B4FC" stroke-width="6" stroke-linecap="round"/>

  <g transform="translate(1030 205)" filter="url(#shadow)">
    <rect width="210" height="270" rx="28" fill="#fff"/>
    <circle cx="105" cy="58" r="30" fill="url(#accent)"/><text x="105" y="68" text-anchor="middle" class="font num">4</text>
    <text x="105" y="120" text-anchor="middle" class="font step">Read in App</text>
    <text x="105" y="154" text-anchor="middle" class="font body">Reader opens it</text>
    <text x="105" y="180" text-anchor="middle" class="font body">inside the protected</text>
    <text x="105" y="206" text-anchor="middle" class="font body">MaiPDF reader.</text>
  </g>

  <g transform="translate(270 545)">
    <rect width="740" height="70" rx="35" fill="#FFFFFF" opacity="0.12"/>
    <text x="370" y="44" text-anchor="middle" class="font cap">Owner can later manage the license: revoke access, extend expiry, change device limits, or review access history.</text>
  </g>
  <text x="640" y="666" text-anchor="middle" class="font foot">Use this path for paid content, confidential PDFs, training manuals, exam materials and files where screenshots matter.</text>
</svg>
