<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#f8fafc"/>

  <text x="400" y="50" font-size="26" font-weight="bold" text-anchor="middle" fill="#1e293b" font-family="Arial, sans-serif">
    How many opens does the link actually need?
  </text>
  <text x="400" y="80" font-size="15" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif">
    audience  ×  expected rereads per person  ×  1.5 buffer
  </text>

  <!-- Box 1: audience -->
  <rect x="60" y="140" width="140" height="110" rx="12" fill="#3b82f6"/>
  <text x="130" y="180" font-size="14" text-anchor="middle" fill="#dbeafe" font-family="Arial, sans-serif">AUDIENCE</text>
  <text x="130" y="220" font-size="40" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial, sans-serif">12</text>
  <text x="130" y="285" font-size="13" text-anchor="middle" fill="#475569" font-family="Arial, sans-serif">hiring panel</text>

  <text x="230" y="205" font-size="36" font-weight="bold" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif">×</text>

  <!-- Box 2: rereads -->
  <rect x="260" y="140" width="140" height="110" rx="12" fill="#10b981"/>
  <text x="330" y="180" font-size="14" text-anchor="middle" fill="#d1fae5" font-family="Arial, sans-serif">REREADS</text>
  <text x="330" y="220" font-size="40" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial, sans-serif">2</text>
  <text x="330" y="285" font-size="13" text-anchor="middle" fill="#475569" font-family="Arial, sans-serif">each reviewer</text>

  <text x="430" y="205" font-size="36" font-weight="bold" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif">×</text>

  <!-- Box 3: buffer -->
  <rect x="460" y="140" width="140" height="110" rx="12" fill="#f59e0b"/>
  <text x="530" y="180" font-size="14" text-anchor="middle" fill="#fef3c7" font-family="Arial, sans-serif">BUFFER</text>
  <text x="530" y="220" font-size="40" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial, sans-serif">1.5</text>
  <text x="530" y="285" font-size="13" text-anchor="middle" fill="#475569" font-family="Arial, sans-serif">mobile + refresh</text>

  <text x="630" y="205" font-size="36" font-weight="bold" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif">=</text>

  <!-- Box 4: result -->
  <rect x="660" y="130" width="110" height="130" rx="12" fill="#1e293b"/>
  <text x="715" y="170" font-size="14" text-anchor="middle" fill="#cbd5e1" font-family="Arial, sans-serif">LIMIT</text>
  <text x="715" y="225" font-size="52" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial, sans-serif">36</text>

  <!-- Bottom note -->
  <rect x="60" y="320" width="680" height="50" rx="8" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="400" y="345" font-size="14" text-anchor="middle" fill="#1e40af" font-family="Arial, sans-serif">
    Setting the limit to the audience size alone almost always locks out the last reader.
  </text>
  <text x="400" y="362" font-size="13" text-anchor="middle" fill="#3b82f6" font-family="Arial, sans-serif">
    Multiply by 1.5 before typing a number into the control panel.
  </text>

  <g id="platform-watermark">
    <rect x="60%" y="92%" width="38%" height="6%" rx="6" fill="#ffffff" opacity="0.75"/>
    <text x="97%" y="96%" text-anchor="end" dominant-baseline="middle"
          font-size="12" font-family="Arial, sans-serif" fill="#0f172a" opacity="0.55">MaiPDF • View Limits</text>
  </g>
</svg>
